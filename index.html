<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas Libres - Gestión de Comercio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-body: #f9fafb;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --input-bg: #ffffff;
            --nav-bg: #ffffff;
        }

        body.dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
            --nav-bg: #1e293b;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); transition: background-color 0.3s, color 0.3s; }
        .bg-card { background-color: var(--bg-card); transition: background-color 0.3s; }
        .accent-color { color: #f59e0b; }
        .bg-accent { background-color: #f59e0b; }
        .border-adaptive { border-color: var(--border-color) !important; }
        
        .btn-primary { 
            background-color: #f59e0b; 
            color: #000; 
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-primary:hover { background-color: #d97706; transform: translateY(-1px); }
        
        input, select, textarea {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-main) !important;
        }
        
        .tab-active {
            border-bottom: 2px solid #f59e0b;
            color: #f59e0b;
            font-weight: 700;
        }

        .tab-content { transition: opacity 0.2s ease-in-out; }
        .table-header { background-color: #f3f4f6; color: #374151; }
        body.dark-mode .table-header { background-color: #0f172a; color: #f59e0b; }

        #login-overlay { background-color: var(--bg-body); z-index: 9999; }
    </style>
</head>
<body class="min-h-screen pb-20 md:pb-0">

    <!-- Pantalla de Login -->
    <div id="login-overlay" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-card p-8 rounded-2xl border border-adaptive w-full max-w-md shadow-2xl">
            <div class="flex flex-col items-center mb-8">
                <div class="p-3 bg-accent rounded-xl mb-4">
                    <i data-lucide="wrench" class="text-black w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold uppercase tracking-widest text-center" id="display-biz-name">Herramientas<span class="accent-color">Libres</span></h1>
                <p class="text-xs opacity-60 mt-2">Versión Beta - Gestión Comercial</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="text-xs text-gray-500 uppercase font-bold">Email</label>
                    <input type="email" id="login-email" required class="w-full p-3 rounded-lg outline-none" placeholder="tu@email.com">
                </div>
                <div>
                    <label class="text-xs text-gray-500 uppercase font-bold">Contraseña</label>
                    <input type="password" id="login-password" required class="w-full p-3 rounded-lg outline-none" placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn" class="btn-primary w-full py-4 rounded-xl mt-4">Ingresar al Sistema</button>
            </form>
            <div id="login-error" class="mt-4 text-red-500 text-sm text-center hidden"></div>
        </div>
    </div>

    <!-- Navegación -->
    <nav class="bg-card border-b border-adaptive sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <div class="flex items-center gap-2">
                <div class="p-2 bg-accent rounded-lg"><i data-lucide="wrench" class="text-black w-6 h-6"></i></div>
                <span class="text-xl font-bold tracking-tight uppercase" id="nav-biz-name">HL<span class="accent-color">Beta</span></span>
            </div>
            <div class="hidden md:flex space-x-6">
                <button onclick="switchTab('stock')" class="nav-link py-5 px-1 text-sm font-medium transition-colors" id="tab-stock">Stock</button>
                <button onclick="switchTab('proveedores')" class="nav-link py-5 px-1 text-sm font-medium transition-colors" id="tab-proveedores">Proveedores</button>
                <button onclick="switchTab('ventas')" class="nav-link py-5 px-1 text-sm font-medium transition-colors" id="tab-ventas">Ventas</button>
                <button onclick="switchTab('clientes')" class="nav-link py-5 px-1 text-sm font-medium transition-colors" id="tab-clientes">Clientes</button>
                <button onclick="switchTab('historial')" class="nav-link py-5 px-1 text-sm font-medium transition-colors" id="tab-historial">Historial</button>
                <button onclick="switchTab('contabilidad')" class="nav-link py-5 px-1 text-sm font-medium transition-colors" id="tab-contabilidad">Contabilidad</button>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="window.toggleTheme()" class="p-2 rounded-full hover:bg-gray-200/50 transition-colors">
                    <i id="theme-icon" data-lucide="moon" class="w-5 h-5 text-gray-500"></i>
                </button>
                <button onclick="signOutUser()" class="text-gray-400 hover:text-red-500 transition-colors">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Navegación Móvil -->
    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-card border-t border-adaptive flex justify-around py-3 z-50 shadow-lg">
        <button onclick="switchTab('stock')" id="m-tab-stock" class="p-2 rounded-lg transition-all"><i data-lucide="package" class="w-6 h-6"></i></button>
        <button onclick="switchTab('proveedores')" id="m-tab-proveedores" class="p-2 rounded-lg transition-all"><i data-lucide="truck" class="w-6 h-6"></i></button>
        <button onclick="switchTab('ventas')" id="m-tab-ventas" class="p-2 rounded-lg transition-all"><i data-lucide="shopping-cart" class="w-6 h-6"></i></button>
        <button onclick="switchTab('clientes')" id="m-tab-clientes" class="p-2 rounded-lg transition-all"><i data-lucide="users" class="w-6 h-6"></i></button>
        <button onclick="switchTab('historial')" id="m-tab-historial" class="p-2 rounded-lg transition-all"><i data-lucide="history" class="w-6 h-6"></i></button>
        <button onclick="switchTab('contabilidad')" id="m-tab-contabilidad" class="p-2 rounded-lg transition-all"><i data-lucide="bar-chart-3" class="w-6 h-6"></i></button>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- SECCIÓN: STOCK -->
        <section id="sec-stock" class="tab-content hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-2xl font-bold">Inventario</h2>
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    <input type="text" id="stock-search" placeholder="Buscar..." class="w-full md:w-64 p-2 rounded text-sm" oninput="window.renderStock()">
                    <button onclick="prepareNew('modal-product')" class="btn-primary px-4 py-2 rounded-lg flex items-center gap-2 shadow-md"><i data-lucide="plus" class="w-4 h-4"></i> Nuevo</button>
                </div>
            </div>
            <div class="bg-card rounded-xl border border-adaptive overflow-x-auto shadow-sm">
                <table class="w-full text-left">
                    <thead class="table-header border-b border-adaptive text-[10px] uppercase font-bold tracking-wider">
                        <tr><th class="p-4">Imagen</th><th class="p-4">Producto</th><th class="p-4">Marca</th><th class="p-4">Stock</th><th class="p-4">Precio</th><th class="p-4">Acciones</th></tr>
                    </thead>
                    <tbody id="stock-list"></tbody>
                </table>
            </div>
        </section>

        <!-- SECCIÓN: VENTAS -->
        <section id="sec-ventas" class="tab-content hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2">
                    <div class="bg-card p-6 rounded-xl border border-adaptive mb-6 shadow-sm">
                        <input type="text" id="search-product" placeholder="Buscar producto..." class="w-full p-4 rounded-lg text-lg">
                        <div id="search-results" class="mt-4 space-y-2"></div>
                    </div>
                </div>
                <div class="bg-card p-6 rounded-xl border border-adaptive h-fit sticky top-24 shadow-lg">
                    <h2 class="text-xl font-bold mb-4">Carrito</h2>
                    <div id="cart-items" class="space-y-3 mb-6"></div>
                    <div class="border-t border-adaptive pt-4 space-y-4">
                        <div class="flex justify-between text-2xl font-bold"><span>Total</span><span id="cart-total" class="accent-color">$ 0,00</span></div>
                    </div>
                    <button onclick="window.processSale()" class="btn-primary w-full mt-6 py-4 rounded-lg flex items-center justify-center gap-2">Finalizar Venta</button>
                </div>
            </div>
        </section>

        <!-- SECCIÓN: HISTORIAL -->
        <section id="sec-historial" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-6">Últimos Movimientos</h2>
            <div class="bg-card rounded-xl border border-adaptive overflow-x-auto shadow-sm">
                <table class="w-full text-left">
                    <thead class="table-header border-b border-adaptive text-[10px] uppercase font-bold tracking-wider">
                        <tr><th class="p-4">Fecha</th><th class="p-4">Cliente</th><th class="p-4">Detalle</th><th class="p-4">Total</th><th class="p-4 text-center">Acción</th></tr>
                    </thead>
                    <tbody id="history-list"></tbody>
                </table>
            </div>
        </section>

        <!-- Secciones simplificadas para brevedad del Canvas -->
        <section id="sec-proveedores" class="tab-content hidden"><h2 class="text-2xl font-bold">Proveedores</h2><div id="supplier-list" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6"></div></section>
        <section id="sec-clientes" class="tab-content hidden"><h2 class="text-2xl font-bold">Clientes</h2><div id="customer-list" class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6"></div></section>
        <section id="sec-contabilidad" class="tab-content hidden"><h2 class="text-2xl font-bold">Contabilidad</h2><div id="expense-list" class="mt-6"></div></section>
    </main>

    <!-- MODAL PRODUCTO -->
    <div id="modal-product" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-card w-full max-w-xl rounded-2xl border border-adaptive overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-adaptive flex justify-between items-center bg-gray-50 dark:bg-black/20"><h3 class="font-bold">Producto</h3><button onclick="closeModal('modal-product')"><i data-lucide="x"></i></button></div>
            <form id="form-product" class="p-6 grid grid-cols-2 gap-4">
                <input type="hidden" id="p-id">
                <div class="col-span-2"><label class="text-xs opacity-60">Nombre</label><input type="text" id="p-name" required class="w-full p-2 rounded"></div>
                <div><label class="text-xs opacity-60">Marca</label><input type="text" id="p-brand" required class="w-full p-2 rounded"></div>
                <div><label class="text-xs opacity-60">Stock</label><input type="number" id="p-stock" required class="w-full p-2 rounded"></div>
                <div><label class="text-xs opacity-60">Precio</label><input type="number" step="0.01" id="p-price" required class="w-full p-2 rounded"></div>
                <div class="col-span-2 pt-4"><button type="submit" class="btn-primary w-full py-3 rounded-lg">Guardar Producto</button></div>
            </form>
        </div>
    </div>

    <!-- MODAL ÉXITO VENTA -->
    <div id="modal-success-sale" class="fixed inset-0 bg-black/80 z-[1000] hidden items-center justify-center p-4">
        <div class="bg-card p-8 rounded-2xl border border-adaptive w-full max-w-md shadow-2xl text-center">
            <div class="p-4 bg-green-500/20 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-6"><i data-lucide="check-circle" class="text-green-500 w-12 h-12"></i></div>
            <h2 class="text-2xl font-bold mb-2">¡Venta Exitosa!</h2>
            <div class="flex flex-col gap-3 mt-6">
                <button id="btn-download-remito" class="btn-primary py-4 rounded-xl flex items-center justify-center gap-2"><i data-lucide="download"></i> Descargar Remito</button>
                <button onclick="closeModal('modal-success-sale')" class="text-gray-500 pt-4 text-sm">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 md:bottom-8 right-8 bg-accent text-black px-6 py-3 rounded-full shadow-2xl font-bold opacity-0 transition-all z-[200]"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, getDoc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, increment } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDsh5-ZzwjO98S1zIXUx6Sw2ICd5SwiHpM",
            authDomain: "herramientaslibres-61449.firebaseapp.com",
            projectId: "herramientaslibres-61449",
            storageBucket: "herramientaslibres-61449.firebasestorage.app",
            messagingSenderId: "184897754209",
            appId: "1:184897754209:web:a68503fa066d8568320620"
        };

        const appId = 'herramientas-libres-pro';
        let db, auth;
        let products = [], suppliers = [], historyRaw = [], cart = [];
        
        // CONFIGURACIÓN DINÁMICA (Se actualizará desde Firestore)
        let appConfig = {
            businessName: "HERRAMIENTAS LIBRES",
            footerMsg: "Este documento es un REMITO de entrega sin valor fiscal."
        };

        const fmt = (n) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' }).format(n);

        const startApp = async () => {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('login-overlay').classList.add('hidden');
                    initListeners();
                    switchTab('stock');
                } else {
                    document.getElementById('login-overlay').classList.remove('hidden');
                }
            });

            document.getElementById('login-form').onsubmit = async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
                } catch (err) { alert("Acceso denegado"); }
            };

            // Buscador ventas
            document.getElementById('search-product').oninput = (e) => {
                const t = e.target.value.toLowerCase();
                const r = document.getElementById('search-results');
                if(!t) { r.innerHTML = ''; return; }
                const f = products.filter(p => p.name.toLowerCase().includes(t) || p.brand.toLowerCase().includes(t));
                r.innerHTML = f.slice(0,5).map(p => `
                    <div onclick="window.addToCartById('${p.id}')" class="flex justify-between items-center p-3 bg-card border border-adaptive rounded-lg cursor-pointer hover:bg-accent/10">
                        <span>${p.name} (${p.brand})</span>
                        <span class="font-bold">${fmt(p.price)}</span>
                    </div>`).join('');
            };

            document.getElementById('form-product').onsubmit = handleProductSubmit;
            document.getElementById('btn-download-remito').onclick = () => window.handleInvoiceDownload();
            lucide.createIcons();
        };

        function initListeners() {
            // ESCUCHAR CONFIGURACIÓN GLOBAL (Desde el Dashboard)
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    appConfig.businessName = data.businessName || "HERRAMIENTAS LIBRES";
                    appConfig.footerMsg = data.footerMsg || "Este documento es un REMITO de entrega sin valor fiscal.";
                    
                    // Actualizar interfaz
                    document.getElementById('display-biz-name').innerHTML = appConfig.businessName;
                    document.getElementById('nav-biz-name').innerHTML = appConfig.businessName;
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), sn => { products = sn.docs.map(d => ({id:d.id, ...d.data()})); window.renderStock(); });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), sn => { 
                historyRaw = sn.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => (b.date?.seconds || 0) - (a.date?.seconds || 0)); 
                window.renderHistory(); 
            });
        }

        window.renderStock = () => {
            const list = document.getElementById('stock-list');
            list.innerHTML = products.map(p => `
                <tr class="border-b border-adaptive hover:bg-gray-50 dark:hover:bg-black/10">
                    <td class="p-4"><img src="${p.image || ''}" class="w-10 h-10 object-cover rounded bg-gray-100" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td class="p-4 font-bold text-sm">${p.name}</td>
                    <td class="p-4 opacity-60 text-xs">${p.brand}</td>
                    <td class="p-4 font-bold text-xs ${p.stock < 5 ? 'text-red-500':'text-green-600'}">${p.stock} UN</td>
                    <td class="p-4 accent-color font-bold text-sm">${fmt(p.price)}</td>
                    <td class="p-4"><button onclick="window.editProductById('${p.id}')" class="text-amber-500"><i data-lucide="edit-2" class="w-4 h-4"></i></button></td>
                </tr>`).join('');
            lucide.createIcons();
        };

        window.renderHistory = () => {
            const list = document.getElementById('history-list');
            const data = historyRaw.slice(0, 10);
            list.innerHTML = data.map(h => `
                <tr class="border-b border-adaptive text-xs">
                    <td class="p-4 opacity-60">${h.date?.toDate().toLocaleDateString() || 'Reciente'}</td>
                    <td class="p-4 font-bold">${h.customerName || 'Mostrador'}</td>
                    <td class="p-4 opacity-70 italic">${h.detail}</td>
                    <td class="p-4 font-bold accent-color">${fmt(h.amount)}</td>
                    <td class="p-4 text-center"><button onclick="window.undoSale('${h.id}')" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                </tr>`).join('');
            lucide.createIcons();
        };

        window.processSale = async () => {
            if(!cart.length) return;
            const total = cart.reduce((s,i) => s + (i.price*i.qty), 0);
            const sData = { 
                customerName: "Mostrador", detail: cart.map(i => `${i.qty}x ${i.name}`).join(', '),
                amount: total, items: [...cart], date: serverTimestamp(), saleMode: 'presencial'
            };
            for(const it of cart) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', it.id), { stock: increment(-it.qty) }); }
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), sData);
            window.currentInvoiceData = { items: [...cart], total, customer: "Mostrador" };
            cart = []; window.renderCart();
            openModal('modal-success-sale');
        };

        window.handleInvoiceDownload = () => {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const data = window.currentInvoiceData;
            doc.setFillColor(245, 158, 11); doc.rect(0, 0, 210, 30, 'F');
            doc.setTextColor(0); doc.setFontSize(18); doc.text(appConfig.businessName.toUpperCase(), 15, 15);
            doc.setFontSize(12); doc.text("REMITO - DOCUMENTO NO FISCAL", 15, 23);
            doc.autoTable({ startY: 40, head: [['Producto', 'Cant.', 'Precio', 'Subtotal']], body: data.items.map(i => [i.name, i.qty, fmt(i.price), fmt(i.price * i.qty)]) });
            doc.text(`TOTAL: ${fmt(data.total)}`, 140, doc.lastAutoTable.finalY + 10);
            doc.setFontSize(8); doc.setTextColor(100);
            doc.text(appConfig.footerMsg, 15, doc.lastAutoTable.finalY + 20);
            doc.save("Remito.pdf");
        };

        // Utilidades comunes...
        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`sec-${id}`).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('tab-active'));
            if(document.getElementById(`tab-${id}`)) document.getElementById(`tab-${id}`).classList.add('tab-active');
            lucide.createIcons();
        };
        window.openModal = (id) => { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); lucide.createIcons(); };
        window.closeModal = (id) => { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); };
        window.addToCartById = (id) => {
            const p = products.find(x => x.id === id);
            if(!p || p.stock <= 0) return;
            const it = cart.find(i => i.id === p.id);
            if(it) it.qty++; else cart.push({...p, qty: 1});
            window.renderCart();
        };
        window.renderCart = () => {
            const c = document.getElementById('cart-items');
            c.innerHTML = cart.map(i => `<div class="flex justify-between text-xs p-2 bg-gray-50 dark:bg-black/20 rounded"><span>${i.name} x${i.qty}</span><b>${fmt(i.price * i.qty)}</b></div>`).join('');
            document.getElementById('cart-total').innerText = fmt(cart.reduce((s,i) => s + (i.price*i.qty), 0));
        };
        async function handleProductSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('p-id').value;
            const data = { 
                name: document.getElementById('p-name').value, brand: document.getElementById('p-brand').value,
                stock: parseInt(document.getElementById('p-stock').value), price: parseFloat(document.getElementById('p-price').value),
                updatedAt: serverTimestamp() 
            };
            if(id) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', id), data);
            else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { ...data, createdAt: serverTimestamp() });
            closeModal('modal-product');
        }
        window.toggleTheme = () => document.body.classList.toggle('dark-mode');
        window.signOutUser = () => signOut(auth);
        window.prepareNew = (id) => { document.getElementById(id).querySelector('form').reset(); document.getElementById(id).querySelector('input[type="hidden"]').value = ''; window.openModal(id); };

        window.addEventListener('load', startApp);
    </script>
</body>
</html>
